<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>REWE Interview Prep</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Converts 404 into a redirect to index.html with the route as query param
    var repo = '/rewe-interview';
    var fullPath = window.location.pathname;

    // Remove the repo prefix to get the Angular route
    var route = fullPath.startsWith(repo)
      ? fullPath.slice(repo.length)
      : fullPath;

    // Preserve hash and search
    var hash = window.location.hash || '';
    var search = window.location.search || '';

    // Redirect to index.html with the route encoded
    window.location.replace(
      window.location.origin + repo + '/?p=' + encodeURIComponent(route + search + hash)
    );
  </script>
</head>
<body></body>
</html>
