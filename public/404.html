<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>REWE Interview Prep</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Redirects all 404s back to index.html with the original path as a query param
    const path = window.location.pathname;
    const search = window.location.search;
    window.location.replace(
      window.location.origin + '/?p=' + encodeURIComponent(path + search)
    );
  </script>
</head>
<body></body>
</html>
