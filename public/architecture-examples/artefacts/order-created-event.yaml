asyncapi: 3.0.0
info:
  title: ParcelFlow Events
  version: 1.0.0
channels:
  commerce.order.created.v1:
    address: commerce.order.created.v1
    messages:
      orderCreated:
        payload:
          type: object
          required: [eventId, occurredAt, orderId, customerId, total]
          properties:
            eventId: { type: string, format: uuid }
            occurredAt: { type: string, format: date-time }
            orderId: { type: string }
            customerId: { type: string }
            total: { type: number, minimum: 0 }
x-owner: commerce-team
x-partition-key: orderId
x-compatibility: backward
x-consumer-rules:
  - Process at least once and deduplicate by eventId.
  - Do not depend on field order.
  - Ignore unknown fields for forward compatibility.
