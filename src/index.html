<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>REWE Interview Prep — REWE Digital Interview Prep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive Java interview preparation for REWE Digital Spain. Practice OOP, Spring Boot, Kafka, System Design and more.">
  <meta name="theme-color" content="#cc071e">

  <!-- Preload fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">

  <!-- Open Graph -->
  <meta property="og:title" content="REWE Interview Prep — REWE Digital Interview Prep">
  <meta property="og:description" content="Master Java, Spring Boot, Kafka, and System Design for REWE Digital">
  <meta property="og:type" content="website">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <base href="/">

  <!-- GitHub Pages SPA routing: recover route from 404 redirect -->
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var route = params.get('p');
      if (route) {
        // route is the Angular path (e.g., /topic/collections)
        // We need to prepend the base path for replaceState
        var base = document.querySelector('base').getAttribute('href') || '/';
        // Remove trailing slash from base, remove leading slash from route
        var cleanBase = base.replace(/\/$/, '');
        var cleanRoute = route.replace(/^\//, '');
        var fullPath = cleanBase + '/' + cleanRoute;
        history.replaceState(null, null, fullPath + location.hash);
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>

  <!-- No-JS fallback -->
  <noscript>
    <p style="text-align:center; padding:2rem; font-family:sans-serif;">
      This application requires JavaScript to run. Please enable it in your browser.
    </p>
  </noscript>
</body>
</html>
